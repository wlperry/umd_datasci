project:
  type: website
  output-dir: docs

# ----------------------------------------------------------------------
# SHARED CORE for the whole project.
# Everything common to every page lives here so it is defined ONCE.
# Slide-only and document-only FORMAT options live in the two thin files
# in _templates/ (copied into each folder as _metadata.yml). See MIGRATION.md.
# ----------------------------------------------------------------------

website:
  title: "UMD Biostatistics"
  site-url: "https://wlperry.github.io/ecostats_2026"
  search: true
  favicon: "favicon.png"

  sidebar:
    logo: "images/course-hex.png"
    style: "docked"
    collapse-level: 1
    contents:
      - text: "← Back to Homepage"
        href: https://wlperry.github.io/index.html

      - section: "Course Information"
        contents:
          - href: index.qmd
            text: "Schedule"
          - href: syllabus.qmd
            text: "Syllabus"
          - href: overview.qmd
            text: "Overview"
          - href: links.qmd
            text: "Helpful Links"

      - section: "Course Materials"
        contents:
          - href: lectures/index.qmd
            text: "Lectures"
          - href: activities/index.qmd
            text: "Activities"
          - href: homeworks/index.qmd
            text: "Homeworks"
          - href: assignments/index.qmd
            text: "Assignments"
          - href: common_code/index.qmd
            text: "Vignettes"

  open-graph: true

  page-footer:
    left: "© 2026 UMD Biostatistics"
    right:
      - icon: github
        href: https://github.com/wlperry
      - icon: envelope-heart-fill
        href: mailto:wlperry@d.umn.edu

# Sensible execution defaults for the whole project. Harmless on the plain
# website pages (no code); document folders inherit these, slides override
# message/warning to false in _templates/_slides.yml.
execute:
  freeze: auto
  cache: true
  echo: true
  warning: true
  message: true

# The website (and every plain page) renders to HTML with the shared theme
# and the single combined stylesheet. Project-absolute paths ("/...") resolve
# from the project root, so they work no matter how deep a folder is nested.
format:
  html:
    theme:
      light: css/theme.scss
      dark: css/theme-dark.scss
    css: css/main.css
    toc: true
