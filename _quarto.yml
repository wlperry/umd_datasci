project:
  type: website
  output-dir: docs

# ----------------------------------------------------------------------
# SHARED CORE for the whole project.
# All common settings live here (defined once).
# Slide-specific and document-specific FORMAT options live in the thin
# _metadata.yml files inside lectures/ and activities|assignments|homeworks/.
# ----------------------------------------------------------------------

website:
  title: "UMD Biostatistics"
  site-url: "https://wlperry.github.io/ecostats_2026"
  search: true
  favicon: "favicon.png"

  sidebar:
    logo: "images/course-hex.png"
    style: "docked"
    collapse-level: 1
    contents:
      - text: "← Back to Homepage"
        href: https://wlperry.github.io/index.html

      - section: "Course Information"
        contents:
          - href: index.qmd
            text: "Schedule"
          - href: admin/syllabus.qmd
            text: "Syllabus"
          - href: admin/overview.qmd
            text: "Overview"
          - href: links.qmd
            text: "Helpful Links"

      - section: "Course Materials"
        contents:
          - href: lectures/index.qmd
            text: "Lectures"
          - href: activities/index.qmd
            text: "Activities"
          - href: homeworks/index.qmd
            text: "Homeworks"
          - href: assignments/index.qmd
            text: "Assignments"
          - href: common_code/index.qmd
            text: "Vignettes"

  open-graph: true

  page-footer:
    left: "© 2026 UMD Biostatistics"
    right:
      - icon: github
        href: https://github.com/wlperry
      - icon: envelope-heart-fill
        href: mailto:wlperry@d.umn.edu

execute:
  freeze: auto
  cache: true
  echo: true
  warning: true
  message: true

# The website renders with the shared Atkinson Hyperlegible font (set in
# theme.scss) and the ONE combined stylesheet (main.css).
# Project-absolute paths (/...) work no matter how deeply a file is nested.
format:
  html:
    theme:
      light: css/theme.scss
      dark: css/theme-dark.scss
    css: /css/main.css
    toc: true
    toc-depth: 3
    toc-location: left
    # Download links appear at the top of the TOC panel on every page.
    # Pages that cannot be rendered to pdf/docx simply ignore these silently.
    # (Individual _metadata.yml files declare the actual format blocks.)
    other-links:
      - text: "⬇ Download PDF"
        href: "#"          # resolved per-page by Quarto when format: pdf is declared
        icon: file-pdf
      - text: "⬇ Download Word"
        href: "#"
        icon: file-word
