<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="520" height="420" rx="16" fill="#f8fafc"/>
  <text x="260" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a2b3c">The pipe</text>
  <text x="260" y="72" text-anchor="middle" font-size="16" fill="#64748b">"the chute" — pass a result onward</text>

  <!-- data -->
  <rect x="180" y="100" width="160" height="54" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="133" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">tree_df</text>

  <!-- pipe 1 -->
  <line x1="260" y1="154" x2="260" y2="184" stroke="#7c3aed" stroke-width="5"/>
  <polygon points="260,190 249,172 271,172" fill="#7c3aed"/>
  <text x="330" y="178" text-anchor="middle" font-size="20" font-weight="700" font-family="monospace" fill="#7c3aed">|&gt;</text>

  <!-- step 1 -->
  <rect x="150" y="196" width="220" height="50" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="227" text-anchor="middle" font-size="16" font-family="monospace" fill="#5b21b6">filter(side == "sunny")</text>

  <!-- pipe 2 -->
  <line x1="260" y1="246" x2="260" y2="276" stroke="#7c3aed" stroke-width="5"/>
  <polygon points="260,282 249,264 271,264" fill="#7c3aed"/>
  <text x="330" y="270" text-anchor="middle" font-size="20" font-weight="700" font-family="monospace" fill="#7c3aed">|&gt;</text>

  <!-- step 2 -->
  <rect x="150" y="288" width="220" height="50" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="260" y="319" text-anchor="middle" font-size="16" font-family="monospace" fill="#5b21b6">summary()</text>

  <!-- result -->
  <text x="260" y="375" text-anchor="middle" font-size="15" fill="#64748b">read it as the word <tspan font-weight="700" fill="#7c3aed">"then"</tspan>:</text>
  <text x="260" y="398" text-anchor="middle" font-size="14" fill="#94a3b8">take tree_df, THEN filter, THEN summarise</text>
</svg>
