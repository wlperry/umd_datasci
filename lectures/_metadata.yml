# =====================================================================
# SLIDES format add-on.
# Copy this into any folder of slide decks, renamed to  _metadata.yml
# (e.g. lectures/_metadata.yml). It is MERGED on top of _quarto.yml,
# so it only needs the slide-specific parts.
# =====================================================================

# Slides show code without re-printing package start-up chatter.
execute:
  message: false
  warning: false

format:
  revealjs:
    theme: [default, ../css/theme.scss]   # same brand font as the website
    css: ../css/main.css                  # same single stylesheet
    self-contained: true
    slide-number: true
    transition: fade
    background-transition: none
    scrollable: true
    smaller: true
    width: 1280
    height: 720
    margin: 0.1
    min-scale: 0.2
    max-scale: 2.0
    fig-width: 6
    fig-height: 6
  pptx:
    reference-doc: ../ms_templates/lecture_template.pptx
    embed-resources: true
    fig-width: 6.5
    fig-height: 4
    fig-dpi: 300
  # Lecture HTML download inherits the html block from _quarto.yml; we just
  # add the per-format download buttons here.
  html:
    downloads: [docx, pptx, typst]
