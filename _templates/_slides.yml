# =====================================================================
# SLIDES format add-on.
# Copy this into   lectures/_metadata.yml
# It is MERGED on top of _quarto.yml.
#
# ── RevealJS heading convention ───────────────────────────────────────
# RevealJS treats BOTH # (H1) and ## (H2) as slide separators, so:
#
#   # My Slide Title          ← H1: new slide (horizontal navigation)
#   ### Sub-heading on slide  ← H3: in-slide heading — USE THIS
#   #### Smaller point        ← H4: also fine for in-slide use
#
#   DO NOT use ## as an in-slide sub-heading — it opens a new slide!
#   If you want vertical (nested) slides, ## inside a # section is fine,
#   but label it clearly in your notes so you know it's a slide break.
# =====================================================================

execute:
  message: false
  warning: false

format:
  revealjs:
    theme: [default, /css/theme.scss]   # Atkinson Hyperlegible font
    css: /css/main.css                  # single shared stylesheet
    self-contained: true
    slide-number: true
    transition: fade
    background-transition: none
    scrollable: true
    smaller: true
    width: 1280
    height: 720
    margin: 0.08
    min-scale: 0.2
    max-scale: 2.0
    fig-width: 6
    fig-height: 5
    # Show download links for the slides themselves
    format-links:
      - pptx

  pptx:
    reference-doc: /ms_templates/lecture_template.pptx
    embed-resources: true
    fig-width: 6.5
    fig-height: 4
    fig-dpi: 300

  # Lecture as a readable HTML document (with TOC and download buttons)
  html:
    toc: true
    toc-depth: 3
    toc-location: left
    format-links:
      - docx

  typst:
    margin:
      x: 0.75in
      y: 0.5in
    number-sections: false
    toc: false
    fig-width: 5
    fig-height: 4
    fig-dpi: 300

revealjs-plugins:
  - editable
filters:
  - editable
