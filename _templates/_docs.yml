# =====================================================================
# DOCUMENTS format add-on.
# Copy this into each HANDOUT folder as  _metadata.yml:
#   activities/_metadata.yml
#   assignments/_metadata.yml
#   homeworks/_metadata.yml
#   common_code/_metadata.yml
#
# It is MERGED on top of _quarto.yml.  Only handout-specific deltas here.
# =====================================================================

execute:
  keep-md: false
  fig-width: 5
  fig-height: 5

format:
  # HTML inherits theme + main.css from _quarto.yml.
  # We add the per-page PDF/Word download buttons here so they appear in
  # the TOC sidebar panel at the top of every handout.
  html:
    embed-resources: true
    self-contained: true
    code-overflow: scroll
    toc: true
    toc-depth: 3
    toc-location: left
    # Download buttons in the TOC — students can grab a local copy.
    format-links:
      - pdf
      - docx
    fig-width: 5
    fig-height: 5

  # Word download (triggered by the format-links: docx entry above)
  docx:
    reference-doc: /ms_templates/custom-reference.docx
    toc: false
    number-sections: false
    highlight-style: github
    embed-resources: true
    fig-format: jpeg
    fig-width: 3
    fig-height: 3
    fig-dpi: 300

  # PDF download (triggered by the format-links: pdf entry above)
  # Uses Typst for fast, reliable PDF generation with no LaTeX dependency.
  typst:
    margin:
      x: 0.75in
      y: 0.5in
    number-sections: false
    toc: false
    fig-width: 3.5
    fig-height: 3.5
    fig-dpi: 300

editor: visual
