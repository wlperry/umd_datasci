# Used ONLY for Lectures and Slides
execute:
  message: false # Overrides the global setting to turn messages off for slides
  warning: false

format:
  revealjs:
    self-contained: true
    css: ../../css/lecture.css
    theme: [default, ../../css/theme.scss]
    slide-number: true
    transition: fade
    background-transition: none
    scrollable: true
    smaller: true
    width: 1280
    height: 720
    margin: 0.1
    min-scale: 0.2
    max-scale: 2.0
    fig-width: 6
    fig-height: 6
  pptx:
    reference-doc: /ms_templates/lecture_template.pptx 
    embed-resources: true
    fig-width: 6.5      
    fig-height: 4       
    fig-dpi: 300        
  html:
    css: /css/lecture.css
    downloads: [docx, pptx, typst]
    max-width: 80ch
    embed-resources: true