# =====================================================================
# DOCUMENTS format add-on.
# Copy this into each handout folder, renamed to  _metadata.yml
# (activities/_metadata.yml, assignments/_metadata.yml, homeworks/_metadata.yml).
# It is MERGED on top of _quarto.yml. These three folders were three nearly
# identical files before — now they share this one.
# =====================================================================

# Handouts run and show code; keep the chatter so students see warnings.
execute:
  keep-md: true
  paged-print: false
  fig-width: 5
  fig-height: 5

format:
  # html is already defined in _quarto.yml (theme + main.css). We only adjust
  # handout-specific options here.
  html:
    embed-resources: true
    self-contained: true
    code-overflow: scroll
    toc: false
    max-width: 80ch
    fig-width: 5
    fig-height: 5
  docx:
    reference-doc: ../ms_templates/custom-reference.docx
    toc: false
    number-sections: false
    highlight-style: github
    embed-resources: true
    fig-format: jpeg
    fig-width: 3
    fig-height: 3
    fig-dpi: 300        # 300 for crisp print; was 72 in some old files
  typst:
    margin:
      x: 0.75in
      y: 0.5in
    number-sections: false
    toc: false
    fig-width: 3.5
    fig-height: 3.5
    fig-dpi: 300

editor: visual
