$schema: https://m.canouil.dev/quarto-wizard/assets/schema/v1/extension-schema.json

attributes:
  absolute:
    width:
      type: string
      pattern: "\\d+(\\.\\d+)?px"
      pattern-exact: true
      description: Absolute width written by Save Edits in pixel units.
      completion:
        type: size
    height:
      type: string
      pattern: "\\d+(\\.\\d+)?px"
      pattern-exact: true
      description: Absolute height written by Save Edits in pixel units.
      completion:
        type: size
    left:
      type: string
      pattern: "-?\\d+(\\.\\d+)?px"
      pattern-exact: true
      description: Absolute left offset written by Save Edits in pixel units.
      completion:
        type: size
    top:
      type: string
      pattern: "-?\\d+(\\.\\d+)?px"
      pattern-exact: true
      description: Absolute top offset written by Save Edits in pixel units.
      completion:
        type: size
    style:
      type: string
      description: Optional inline styles written by Save Edits, such as font-size, text-align, and rotate transform.
      completion:
        type: freeform
        placeholder: font-size: 18px; text-align: center; transform: rotate(15deg);

classes:
  editable:
    description: Marks image or Div content as interactive for dragging, resizing, and rotating in revealjs preview.
  absolute:
    description: Marks saved positioned content with absolute geometry generated by the editable plugin.
